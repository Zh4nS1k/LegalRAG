name: Legally CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- GO (Backend) ---
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Go Format Check
        run: |
          cd backend/legally
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Install Go Dependencies
        run: cd backend/legally && go mod download

      - name: Run Go Tests
        run: cd backend/legally && go test ./tests/... ./api/controllers/... -v

      # --- PYTHON (AI Service) ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-mock pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 ai_service --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 ai_service --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Python Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest ai_service/tests
        env:
          PINECONE_API_KEY: "dummy-key-for-ci"
          GROQ_API_KEY: "dummy-key-for-ci"

      # --- NODE.JS (Frontend) ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/legally-app/package-lock.json

      - name: Install Node Dependencies
        run: cd frontend/legally-app && npm install

      - name: Frontend Lint
        run: cd frontend/legally-app && npm run lint || echo "Lint failed but continuing"

      - name: Run Frontend Tests
        run: cd frontend/legally-app && npm test -- --watchAll=false

  docker-build-check:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t legally-backend ./backend/legally

      - name: Build AI Service Image
        run: docker build -t legally-ai ./ai_service
