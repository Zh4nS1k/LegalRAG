services:
  mongodb:
    image: mongo:latest
    container_name: legally_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: legally_ai_service
    ports:
      - "8001:8000" # <--- ВНЕШНИЙ 8001 : ВНУТРЕННИЙ 8000
    env_file:
      - ./ai_service/.env
    restart: unless-stopped
    depends_on:
      - mongodb

  backend:
    build:
      context: ./backend/legally
      dockerfile: Dockerfile
    container_name: legally_backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/legally/.env
    restart: unless-stopped
    depends_on:
      - mongodb
      - ai_service

  frontend:
    build:
      context: ./frontend/legally-app
      dockerfile: Dockerfile
    container_name: legally_frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  mongodb_data:
